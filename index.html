<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaraaa's Love Dashboard v2.2</title>
    <style>
        :root {
            --bg-dark: #0d0b11;
            --panel-bg: rgba(26, 21, 36, 0.75);
            --neon-pink: #ff52a2;
            --neon-fuchsia: #e82c88;
            --neon-purple: #9d4edd;
            --text-main: #f3f0f7;
            --text-muted: #a49cb3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Background Animated Particles */
        .bg-particle {
            position: absolute;
            pointer-events: none;
            font-size: 20px;
            opacity: 0.4;
            animation: floatUp linear forwards;
            z-index: 0;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Blast Particles */
        .blast-particle {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            z-index: 9999;
            animation: blastOut 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes blastOut {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0.3); opacity: 0; }
        }

        .dashboard-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 82, 162, 0.25);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 25px rgba(255, 82, 162, 0.15);
            z-index: 10;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 82, 162, 0.3);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-pink);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .panel-block {
            background: rgba(13, 11, 17, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            transition: border 0.3s ease;
        }

        .panel-block:hover {
            border-color: rgba(255, 82, 162, 0.2);
        }

        /* Slider Kangen */
        .slider-container {
            position: relative;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .slider-header span:last-child {
            font-weight: 700;
            color: var(--neon-pink);
            text-shadow: 0 0 8px rgba(255, 82, 162, 0.4);
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            margin: 10px 0;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-fuchsia));
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-pink);
            transition: transform 0.1s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Mood Selector */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .mood-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .mood-box .emoji {
            font-size: 22px;
        }

        .mood-box:hover {
            background: rgba(255, 82, 162, 0.08);
            border-color: rgba(255, 82, 162, 0.3);
            transform: translateY(-2px);
        }

        .mood-box.active {
            background: linear-gradient(135deg, rgba(255, 82, 162, 0.2), rgba(157, 78, 221, 0.2));
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px rgba(255, 82, 162, 0.25);
            font-weight: 600;
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: white;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            box-shadow: 0 4px 15px rgba(255, 82, 162, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 82, 162, 0.5);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Terminal Note */
        .input-area {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            font-size: 13px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        .input-area:focus {
            border-color: var(--neon-purple);
        }

        .btn-send {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px;
            font-size: 13px;
            margin-bottom: 0;
        }

        .btn-send:hover {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid var(--neon-pink);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), 0 0 15px rgba(255, 82, 162, 0.3);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
            white-space: nowrap;
        }

        .toast.show {
            bottom: 30px;
        }

        .toast .icon {
            font-size: 18px;
        }

        .toast .msg {
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>ZARAAA'S CORE LINK</h1>
            <p>Satelit Pemancar Sinyal Bucin Khusus Uqiii v2.2</p>
        </div>

        <!-- Panel Kangen -->
        <div class="section-title">📊 RADAR EMOSIONAL</div>
        <div class="panel-block slider-container">
            <div class="slider-header">
                <span>Intensitas Kangen:</span>
                <span id="bucin-val">50%</span>
            </div>
            <input type="range" min="0" max="100" value="50" class="range-slider" id="love-slider" oninput="updateBucin(this.value)">
        </div>

        <!-- Panel Kondisi -->
        <div class="section-title">🔮 AKTIVITAS & MOOD</div>
        <div class="panel-block">
            <div class="mood-grid">
                <div class="mood-box" onclick="kirimMood(this, 'Lagi Sibuk Kuliah/Tugas 📚')">
                    <span class="emoji">📚</span>
                    <span>Sibuk Tugas</span>
                </div>
                <div class="mood-box" onclick="kirimMood(this, 'Kangen Berat / Butuh Dimanja 💕')">
                    <span class="emoji">💕</span>
                    <span>Kangen Berat</span>
                </div>
                <div class="mood-box" onclick="kirimMood(this, 'Lagi Pengen Ngobrol / Gabut 📱')">
                    <span class="emoji">📱</span>
                    <span>Gabut / Chill</span>
                </div>
                <div class="mood-box" onclick="kirimMood(this, 'Mode Sensitif / Jangan Dicuekin 😾')">
                    <span class="emoji">😾</span>
                    <span>Sensitif (Peka!)</span>
                </div>
            </div>
        </div>

        <!-- Panel Interaksi Cepat -->
        <div class="section-title">📡 TRANSMITTER LANGSUNG</div>
        <button class="btn btn-primary" onclick="pencetBuzzer(event)">
            <span>💖</span> Nge-Ping Uqiii
        </button>
        <button class="btn btn-danger" onclick="panggilDarurat(event)">
            <span>🚨</span> Butuh Perhatian! (SOS)
        </button>

        <!-- Panel Terminal Catatan -->
        <div class="section-title">💬 ENKRIPSI MEMO TERMINAL</div>
        <div class="panel-block" style="margin-bottom: 0;">
            <textarea class="input-area" id="note-text" rows="3" placeholder="Tulis sesuatu untuk Uqii di sini..."></textarea>
            <button class="btn btn-send" onclick="kirimCatatan()">Kirim Memo ke Discord</button>
        </div>
    </div>

    <!-- Sistem Toast -->
    <div class="toast" id="custom-toast">
        <span class="icon" id="toast-icon">✨</span>
        <span class="msg" id="toast-msg">Sinyal berhasil dikirim!</span>
    </div>

    <script>
        // Gunakan Webhook URL yang sama agar pesan kalian berdua masuk di server Discord yang sama!
        const DISCORD_WEBHOOK_URL = "https://discordapp.com/api/webhooks/1524831289415434354/EiC3hkhyhbO4yKvPVcvUT3YbOJRMBgsr-LbD5SgqHah9O8Wz9bgoQWFdHKdlqnYPqwCs";

        // VARIABEL STATE GLOBAL STATUS ZARAAA
        let currentLevelKangen = "50%";
        let currentMood = "Belum Diatur 📋";
        let sinyalDarurat = "Kondisi Aman ✅";
        let loveBuzzerStatus = "Belum ada interaksi 📡";
        let catatanTerakhir = "Belum ada pesan terbaru 💬";

        // Kumpulan teks acak untuk tombol "Nge-Ping Uqiii"
        const teksPing = [
            "Zaraaa mendadak kangen berat sama Uqii! 👀🔥",
            "Sinyal gemas meluncur, Uqii wajib bales secepatnya! 🚀🌸",
            "Cuma mau nge-ping biar Uqii tahu kalau Zaraaa lagi mikirin Uqii 😜✨",
            "Deteksi kangen berbunyi: Uqii mana yaaa? 🛰️🎀"
        ];

        // Kumpulan teks acak untuk tombol "Butuh Perhatian" (Emergency)
        const teksDarurat = [
            "🚨 Zaraaa lagi butuh perhatian lebih/pukpuk secepatnya!",
            "🚨 Sinyal SOS Manja! Uqii harus buru-buru cek HP sekarang! 🥺",
            "🚨 Warning! Kuota kangen Zaraaa sudah kritis, butuh asupan perhatian Uqii! 💕",
            "🚨 Emergency Core! Hubungi Zaraaa segera atau mode merajuk akan aktif! 😤"
        ];

        // Generator Partikel Latar Belakang (Versi Cewek)
        function buatPartikelLatar() {
            if (document.visibilityState !== 'visible') return; 
            const emojis = ["✨", "💖", "🌸", "🎵", "🔮"];
            const p = document.createElement("div");
            p.classList.add("bg-particle");
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }
        setInterval(buatPartikelLatar, 700); 

        function showToast(message, icon = "✨") {
            const toast = document.getElementById("custom-toast");
            document.getElementById("toast-msg").innerText = message;
            document.getElementById("toast-icon").innerText = icon;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        // Efek Ledakan Emote
        function buatLedakanPartikel(x, y, jumlah = 5) {
            const partikelOpsi = ["🌸", "✨", "💖", "🎀", "🔥"];
            for (let i = 0; i < jumlah; i++) {
                const p = document.createElement("div");
                p.classList.add("blast-particle");
                p.innerText = partikelOpsi[Math.floor(Math.random() * partikelOpsi.length)];
                p.style.left = x + "px";
                p.style.top = y + "px";
                
                const sudut = Math.random() * Math.PI * 2;
                const jarak = Math.random() * 80 + 20; 
                const mx = Math.cos(sudut) * jarak + "px";
                const my = Math.sin(sudut) * jarak + "px";

                p.style.setProperty('--mx', mx);
                p.style.setProperty('--my', my);

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800); 
            }
        }

        function updateBucin(val) {
            currentLevelKangen = val + "%";
            document.getElementById("bucin-val").innerText = currentLevelKangen;
        }

        document.getElementById("love-slider").addEventListener("change", function() {
            showToast(`Sinyal kangen disetel ke: ${currentLevelKangen}`, "📈");
            kirimKeDiscord("LEVEL KANGEN BERUBAH");
        });

        function kirimMood(elemen, namaMood) {
            document.querySelectorAll('.mood-box').forEach(box => box.classList.remove('active'));
            elemen.classList.add('active');
            
            currentMood = namaMood;

            showToast(`Status: ${namaMood}`, "📊");
            kirimKeDiscord("MOOD TERKINI BERUBAH");
        }

        // Aksi saat tombol "Nge-Ping Uqiii" dipencet
        function pencetBuzzer(e) {
            buatLedakanPartikel(e.clientX, e.clientY, 5); 
            const teks = teksPing[Math.floor(Math.random() * teksPing.length)];
            
            loveBuzzerStatus = `💖 DIPENCET! "${teks}"`;
            
            showToast("Radar terkirim! Uqii kena ledakan gemas!", "🛰️");
            kirimKeDiscord("RADAR TRANSMITTER PING");
        }

        // Aksi saat tombol "Butuh Perhatian" dipencet
        function panggilDarurat(e) {
            buatLedakanPartikel(e.clientX, e.clientY, 10); 
            const teks = teksDarurat[Math.floor(Math.random() * teksDarurat.length)];
            
            sinyalDarurat = teks;
            
            showToast("Sinyal SOS Manja terkirim ke Discord!", "🚨");
            kirimKeDiscord("EMERGENCY CORE TRIGGERED");
        }

        function kirimCatatan() {
            const area = document.getElementById("note-text");
            const isi = area.value.trim();
            if(!isi) {
                showToast("Pesan tidak boleh kosong!", "⚠️");
                return;
            }
            
            catatanTerakhir = isi;
            
            showToast("Memo terenkripsi berhasil dikirim!", "📌");
            area.value = "";
            kirimKeDiscord("DEKRIPSI TERMINAL PESAN MASUK");
        }

        // FUNGSI SEND EMBED KE DISCORD
        function kirimKeDiscord(namaAksi) {
            const waktuSekarang = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            let embedTitle = "";
            let actionHighlight = "";
            let embedColor = 15728564; // Default: Pink Cyber

            switch(namaAksi) {
                case "SYSTEM CORE ONLINE":
                    embedTitle = "🌸 ZARAAA SYSTEM ONLINE";
                    actionHighlight = "Satelit pemancar dashboard Zaraaa kini aktif mendampingi Uqii! ✨";
                    embedColor = 16742314; // Rose Pink
                    break;
                case "MOOD TERKINI BERUBAH":
                    embedTitle = "🌸 📊 UPDATE STATUS VITAL";
                    actionHighlight = `Aktivitas & kondisi Zaraaa saat ini: **${currentMood}**`;
                    embedColor = 15219166; // Fuchsia
                    break;
                case "LEVEL KANGEN BERUBAH":
                    embedTitle = "🌸 📥 SINKRONISASI KANGEN";
                    actionHighlight = `Zaraaa memperbarui tingkat radar kangen ke: **${currentLevelKangen}**`;
                    embedColor = 16007386; // Hot Pink
                    break;
                case "RADAR TRANSMITTER PING":
                    embedTitle = "🌸 🛰️ RADAR TRANSMITTER PING";
                    actionHighlight = `🚨 **ZARAAA BUZZ PING!** 🚨\n*${loveBuzzerStatus.replace('💖 DIPENCET! ', '')}*`;
                    embedColor = 16723636; // Vibrant Pink
                    break;
                case "EMERGENCY CORE TRIGGERED":
                    embedTitle = "🚨 EMERGENCY CO-PILOT NEEDED";
                    actionHighlight = `⚠️ **PROSEDUR CRITICAL:**\n*${sinyalDarurat}*`;
                    embedColor = 16718131; // Rose Dark
                    break;
                case "DEKRIPSI TERMINAL PESAN MASUK":
                    embedTitle = "💬 DEKRIPSI TERMINAL PESAN MASUK";
                    actionHighlight = "Sebuah transkrip rahasia masuk dari Zaraaa untuk Uqii.";
                    embedColor = 16758464; // Pastel Orange/Pink
                    break;
                default:
                    embedTitle = "🌸 ZARAAA'S LOVE DASHBOARD STATUS";
                    actionHighlight = `Status kumulatif saat aktivitas "${namaAksi}" dipicu:`;
            }

            const payload = {
                username: "Zaraaa's Dashboard v2.2",
                avatar_url: "https://i.imgur.com/vHqB3qL.png",
                embeds: [
                    {
                        title: embedTitle,
                        description: `${actionHighlight}\n\n` +
                                     `📊 **Status Aktivitas**\n**${currentMood}**\n\n` +
                                     `📈 **Level Kangen**\n**${currentLevelKangen}**\n\n` +
                                     `🚨 **Sinyal Kondisi**\n**${sinyalDarurat}**\n\n` +
                                     `🔔 **Love Buzzer Status**\n*${loveBuzzerStatus}*\n\n` +
                                     `📌 **Memo Terakhir Zaraaa**\n> ${catatanTerakhir}`,
                        color: embedColor,
                        footer: {
                            text: `Zaraaa's Dashboard v2.2 // Mode Meriah Aktif | Today at ${waktuSekarang}`
                        }
                    }
                ]
            };

            payload.content = `📢 **Aktivitas Terbaru Zaraaa | Aksi: ${namaAksi}**`;

            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .catch(err => console.error("Gagal mengirim sinyal ke Discord:", err));
            
            // Mengembalikan status darurat ke aman setelah payload dikirim agar tidak menumpuk status lama
            if (namaAksi === "EMERGENCY CORE TRIGGERED") {
                setTimeout(() => {
                    sinyalDarurat = "Kondisi Aman ✅";
                }, 1000);
            }
        }

        window.onload = function() {
            kirimKeDiscord("SYSTEM CORE ONLINE");
        };
    </script>
</body>
</html>
